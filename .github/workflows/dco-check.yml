name: Check Developer Certificate of Origin (DCO)
on:
  pull_request:
    branches:
      - main
jobs:
  check:
    name: Check DCO
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - name: Check DCO
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DCO_CHECK_VERBOSE: '1'
          DCO_CHECK_EXCLUDE_EMAILS: ${{ inputs.exclude-emails }}
        run: |
          pip3 install -U dco-check
          # Excluding GitHub bot account due to email mismatch.
          # See https://github.com/dependabot/dependabot-core/issues/3480
          dco-check -p '\w+\[bot\]@users.noreply.github.com'
