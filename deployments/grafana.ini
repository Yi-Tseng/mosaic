# Grafana Configuration
# Optimized for real-time dashboards

[dashboards]
# Minimum dashboard refresh interval (default is 5s)
min_refresh_interval = 1s

[unified_alerting]
# Faster alert evaluation
min_interval = 1s

[live]
# Enable Grafana Live for real-time streaming
max_connections = 100
