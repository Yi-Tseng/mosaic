# OpenTelemetry Collector Configuration
# Optimized for low-latency metrics export

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch processor with aggressive settings for faster export
  batch:
    timeout: 1s           # Export every 1 second (default is 200ms but we want to align with scrape)
    send_batch_size: 100  # Send after 100 items (default is 8192)
    send_batch_max_size: 500

exporters:
  # Prometheus exporter - exposes metrics on port 8889 for pipeline analyzer
  prometheus:
    endpoint: "0.0.0.0:8889"
    send_timestamps: true
    metric_expiration: 5m
    resource_to_telemetry_conversion:
      enabled: true

  # Debug logging (optional - comment out in production)
  # debug:
  #   verbosity: detailed

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
